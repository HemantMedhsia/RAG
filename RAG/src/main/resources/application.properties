spring.application.name=RAG

spring.datasource.url=jdbc:postgresql://your-db
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

security.jwt.secret=mynameishemantmynameishemantmynameishemantmynameishemantmynameishemantmynameishemant
security.jwt.access-exp-minutes=3
security.jwt.refresh-exp-minutes=10

openrouter.api.key=your-api-key
